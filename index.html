<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PakContent AI — Pakistan ka #1 Content Generator</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Arial, sans-serif; background: #0f0f1a; color: #fff; min-height: 100vh; }
  .header { background: linear-gradient(135deg, #1a1a2e, #16213e); padding: 20px; text-align: center; border-bottom: 2px solid #00d4aa; }
  .logo { font-size: 28px; font-weight: bold; color: #00d4aa; }
  .logo span { color: #ff6b9d; }
  .tagline { font-size: 14px; color: #aaa; margin-top: 5px; }
  .container { max-width: 700px; margin: 30px auto; padding: 0 20px; }
  .card { background: #1a1a2e; border: 1px solid #2a2a4a; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .card h3 { font-size: 14px; color: #aaa; margin-bottom: 12px; }
  .type-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
  .type-btn { background: #0f0f1a; border: 1px solid #2a2a4a; border-radius: 8px; padding: 12px; font-size: 13px; color: #fff; cursor: pointer; text-align: left; transition: all 0.2s; }
  .type-btn:hover { border-color: #00d4aa; }
  .type-btn.active { background: #003d30; border-color: #00d4aa; color: #00d4aa; }
  textarea, select { width: 100%; background: #0f0f1a; border: 1px solid #2a2a4a; border-radius: 8px; padding: 12px; font-size: 14px; color: #fff; font-family: Arial, sans-serif; resize: vertical; }
  textarea { min-height: 90px; line-height: 1.6; }
  .lang-row { display: flex; gap: 8px; }
  .lang-btn { flex: 1; padding: 10px; font-size: 13px; border: 1px solid #2a2a4a; border-radius: 8px; background: #0f0f1a; color: #fff; cursor: pointer; transition: all 0.2s; }
  .lang-btn.active { background: #003d30; border-color: #00d4aa; color: #00d4aa; font-weight: bold; }
  .gen-btn { width: 100%; padding: 14px; font-size: 16px; font-weight: bold; background: linear-gradient(135deg, #00d4aa, #00a884); color: #0f0f1a; border: none; border-radius: 10px; cursor: pointer; margin-top: 4px; transition: opacity 0.2s; }
  .gen-btn:hover { opacity: 0.9; }
  .gen-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .result-area { background: #0f0f1a; border: 1px solid #2a2a4a; border-radius: 8px; padding: 16px; min-height: 120px; font-size: 14px; line-height: 1.8; color: #e0e0e0; white-space: pre-wrap; }
  .action-row { display: flex; gap: 8px; margin-top: 10px; }
  .action-btn { flex: 1; padding: 10px; font-size: 13px; border: 1px solid #2a2a4a; border-radius: 8px; background: transparent; color: #aaa; cursor: pointer; transition: all 0.2s; }
  .action-btn:hover { border-color: #00d4aa; color: #00d4aa; }
  .loading { display: flex; align-items: center; gap: 10px; color: #aaa; padding: 16px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: #00d4aa; animation: bounce 1s infinite; }
  .dot:nth-child(2) { animation-delay: 0.15s; }
  .dot:nth-child(3) { animation-delay: 0.3s; }
  @keyframes bounce { 0%,80%,100%{transform:scale(0.7);opacity:0.5} 40%{transform:scale(1.2);opacity:1} }
  .hidden { display: none; }
  .footer { text-align: center; padding: 20px; color: #555; font-size: 12px; }
  .badge { display: inline-block; background: #ff6b9d22; border: 1px solid #ff6b9d; color: #ff6b9d; font-size: 11px; padding: 3px 10px; border-radius: 20px; margin-bottom: 8px; }
</style>
</head>
<body>

<div class="header">
  <div class="logo">Pak<span>Content</span> AI</div>
  <div class="tagline">Pakistan ka #1 AI Content Generator — Urdu & English</div>
</div>

<div class="container">

  <div class="card">
    <h3>Content Type chunein:</h3>
    <div class="type-grid">
      <button class="type-btn active" onclick="selectType(this,'social')">📱 Social Media Caption</button>
      <button class="type-btn" onclick="selectType(this,'blog')">📝 Blog Post Intro</button>
      <button class="type-btn" onclick="selectType(this,'email')">📧 Email Template</button>
      <button class="type-btn" onclick="selectType(this,'product')">🛍️ Product Description</button>
    </div>
  </div>

  <div class="card">
    <h3>Apna topic ya product likho:</h3>
    <textarea id="topic" placeholder="Misal: Mera online clothing store hai, Instagram ke liye caption chahiye..."></textarea>
  </div>

  <div class="card">
    <h3>Zabaan chunein:</h3>
    <div class="lang-row">
      <button class="lang-btn active" onclick="selectLang(this,'urdu')">اردو</button>
      <button class="lang-btn" onclick="selectLang(this,'english')">English</button>
      <button class="lang-btn" onclick="selectLang(this,'both')">Urdu + English</button>
    </div>
  </div>

  <button class="gen-btn" onclick="generate()" id="genBtn">✨ Content Generate Karo</button>

  <div id="resultCard" class="card hidden" style="margin-top:16px;">
    <h3>Generated Content:</h3>
    <div id="loading" class="loading hidden">
      <div class="dot"></div><div class="dot"></div><div class="dot"></div>
      <span>AI likh raha hai...</span>
    </div>
    <div id="result" class="result-area hidden"></div>
    <div id="actions" class="action-row hidden">
      <button class="action-btn" onclick="copyText()">📋 Copy Karo</button>
      <button class="action-btn" onclick="generate()">🔄 Dobara Generate</button>
    </div>
  </div>

</div>

<div class="footer">Made with ❤️ for Pakistani Businesses — PakContent AI</div>

<script>
let selType = 'social', selLang = 'urdu';

function selectType(btn, t) {
  document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active'); selType = t;
}
function selectLang(btn, l) {
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active'); selLang = l;
}

function getPrompt() {
  const topic = document.getElementById('topic').value;
  const types = { social:'social media caption (Instagram/Facebook)', blog:'blog post intro (150-200 words)', email:'professional email template', product:'product description' };
  const langs = { urdu:'Urdu (Roman Urdu is fine)', english:'English', both:'bilingual Urdu and English' };
  return `Write a ${types[selType]} for: "${topic}". Language: ${langs[selLang]}. Make it engaging for Pakistani audience. Add emojis if social media content.`;
}

async function generate() {
  const topic = document.getElementById('topic').value.trim();
  if (!topic) { alert('Pehle topic likho!'); return; }
  const btn = document.getElementById('genBtn');
  btn.disabled = true; btn.textContent = 'Generate ho raha hai...';
  document.getElementById('resultCard').classList.remove('hidden');
  document.getElementById('loading').classList.remove('hidden');
  document.getElementById('result').classList.add('hidden');
  document.getElementById('actions').classList.add('hidden');
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{ role: 'user', content: getPrompt() }]
      })
    });
    const data = await res.json();
    const text = data.content.map(i => i.text || '').join('');
    document.getElementById('loading').classList.add('hidden');
    document.getElementById('result').classList.remove('hidden');
    document.getElementById('result').textContent = text;
    document.getElementById('actions').classList.remove('hidden');
  } catch(e) {
    document.getElementById('loading').classList.add('hidden');
    document.getElementById('result').classList.remove('hidden');
    document.getElementById('result').textContent = 'Error aa gaya. Dobara try karein.';
  }
  btn.disabled = false; btn.textContent = '✨ Content Generate Karo';
}

function copyText() {
  const t = document.getElementById('result').textContent;
  navigator.clipboard.writeText(t).then(() => {
    const btn = event.target;
    btn.textContent = '✅ Copy ho gaya!';
    setTimeout(() => btn.textContent = '📋 Copy Karo', 2000);
  });
}
</script>
</body>
</html>
